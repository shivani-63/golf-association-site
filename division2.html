<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Division 2</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body data-page="fixtures" data-division="division-2">
    <header>
      <img id="site-logo" alt="League Logo" />
      <h1>Division 2</h1>
    </header>

    <main>
      <h2>Fixtures</h2>

      <table class="fixtures-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Home</th>
            <th>Result</th>
            <th>Away</th>
          </tr>
        </thead>
        <tbody id="fixtures-table"></tbody>
      </table>
    </main>

    <footer>
      <div id="club-footer-list"></div>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
