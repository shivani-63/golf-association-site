<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>League Tables</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body data-page="league-tables">
    <header>
      <img id="site-logo" alt="League Logo" />
      <h1>League Tables</h1>
    </header>

    <main>
      <h2>Division 1</h2>
      <table class="league-table">
        <thead>
          <tr>
            <th>Team</th>
            <th>P</th>
            <th>W</th>
            <th>D</th>
            <th>L</th>
            <th>PF</th>
            <th>PA</th>
            <th>PD</th>
            <th>Pts</th>
          </tr>
        </thead>
        <tbody id="division-1-league-table-body"></tbody>
      </table>

      <h2>Division 2</h2>
      <table class="league-table">
        <thead>
          <tr>
            <th>Team</th>
            <th>P</th>
            <th>W</th>
            <th>D</th>
            <th>L</th>
            <th>PF</th>
            <th>PA</th>
            <th>PD</th>
            <th>Pts</th>
          </tr>
        </thead>
        <tbody id="division-2-league-table-body"></tbody>
      </table>
    </main>

    <footer>
      <div id="club-footer-list"></div>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
